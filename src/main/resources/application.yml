server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
spring:
  application:
    name: youtube-extractor
  datasource:
    url: jdbc:postgresql://localhost:5432/youtube-extractor
    username: postgres
    password: cost#123$
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-migration-naming: true
  batch:
    job:
      name: "OAIProcessorService Job" # temp
logging:
  level:
    org.flywaydb: info

youtube:
  api-key: ${YOUTUBE_API_KEY}
  application-name: youtube-extractor

rag:
  api:
    base-url: "http://localhost:8000"
  model:
    properties:
      max_tokens: 2048
      temperature: 0.8
      top_p: 0.3
      repeat_penalty: 1.2
  embedding:
    properties:
      chunkSize: 1024
      overlap: 128
      normalize: true
qdrant:
  grpc:
    host: localhost
    port: 6334
    api-key: ${QDRANT_API_KEY}

springdoc:
  swagger-ui:
    path: /swagger

gpt:
  key: ${GPT_API_KEY}
  model: gpt-5-2
  pricing:
    input-usd-per-1m: "0.25"
    output-usd-per-1m: "2"

arxiv:
  search-url: https://export.arxiv.org/api/query?search_query=
oai:
  processing:
    days-back: 90
    sources: ARXIV
  zenodo:
    base-url: https://zenodo.org/oai2d
    metadata-prefix: oai_datacite
    api-base-url: https://zenodo.org/api/records/
    pagination-delay-ms: 500
  arxiv:
    base-url: "https://export.arxiv.org/oai2"
    metadata-prefix: arXiv
    pdf-base-url: "https://arxiv.org/pdf/"
    pagination-delay-ms: 1000
  pubmed:
    base-url: "https://www.ncbi.nlm.nih.gov/pmc/oai/oai.cgi"
    metadata-prefix: oai_dc
    set: pmc-open
    oa-service-url: "https://www.ncbi.nlm.nih.gov/pmc/utils/oa/oa.fcgi"
    pagination-delay-ms: 350
grobid:
  base-url: http://localhost:8070
  fulltext-endpoint: /api/processFulltextDocument
  client:
    concurrency: 8
    queue: 16
  options:
    consolidate-header: true
    consolidate-citations: true
    segment-sentences: true
    include-raw-citations: true
    include-raw-affiliations: true

resilience4j:
  circuitbreaker:
    instances:
      transcript429:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 10
        failureRateThreshold: 50
        permittedNumberOfCallsInHalfOpenState: 1
        waitDurationInOpenState: 30m
        recordExceptions:
          - com.data.shared.exception.TranscriptRateLimitedException
  ratelimiter:
    instances:
      transcript:
        limitForPeriod: 1
        limitRefreshPeriod: 12s
        timeoutDuration: 30s
      arxiv:
        limitForPeriod: 3
        limitRefreshPeriod: 5s
        timeoutDuration: 60s
      zenodo:
        limitForPeriod: 5
        limitRefreshPeriod: 5s
        timeoutDuration: 60s
      pubmed:
        limitForPeriod: 5
        limitRefreshPeriod: 5s
        timeoutDuration: 60s

  retry:
    instances:
      transcript:
        maxAttempts: 2
        retryExceptions:
          - com.data.shared.exception.TranscriptRateLimitedException
        waitDuration: 60s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2.0
        exponentialMaxWaitDuration: 10m
      zenodo:
        maxAttempts: 5
        waitDuration: 5s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2.0
        exponentialMaxWaitDuration: 30s
        retryExceptions:
          - org.springframework.web.client.ResourceAccessException
          - com.data.oai.RetryableApiException
      arxiv:
        maxAttempts: 5
        waitDuration: 3s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2.0
        exponentialMaxWaitDuration: 30s
        retryExceptions:
          - org.springframework.web.client.ResourceAccessException
          - com.data.oai.RetryableApiException
      pubmed:
        maxAttempts: 5
        waitDuration: 3s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2.0
        exponentialMaxWaitDuration: 16s
        retryExceptions:
          - org.springframework.web.client.ResourceAccessException
          - com.data.oai.RetryableApiException
      grobid:
        maxAttempts: 3
        waitDuration: 5s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2.0
        exponentialMaxWaitDuration: 10s
        retryExceptions:
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException